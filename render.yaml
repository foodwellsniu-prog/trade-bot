services:
  - type: worker
    name: hft-bot-ethusdt
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free

    envVars:
      - key: USE_TESTNET
        value: "true"

      - key: BINANCE_API_KEY
        sync: false        # Set manually in Render dashboard

      - key: BINANCE_API_SECRET
        sync: false        # Set manually in Render dashboard

      - key: TELEGRAM_BOT_TOKEN
        sync: false        # Set manually in Render dashboard

      - key: TELEGRAM_CHAT_ID
        sync: false        # Set manually in Render dashboard

      - key: PORT
        value: "8080"
