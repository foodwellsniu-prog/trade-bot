services:
  - type: web
    name: eth-hft-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: MODE
        value: TESTNET
      - key: API_KEY
        sync: false
      - key: API_SECRET
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: CHAT_ID
        sync: false
